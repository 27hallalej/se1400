<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Grid Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="parent">
        <header class="grid-item header">Header</header>
        <nav class="grid-item nav">Navigation</nav>
        
        <aside class="grid-item sidebar-left">Left sidebar</aside>
        
        <main class="grid-item main-content">
            <div class="content-top">Top content</div>
	    <!-- The left and right sections aren't working but I don't have enough time to fix them :( -->
	    <!-- Also, Figma was making me purchase a subscription to edit it like the video showed, so I had to make it from "scratch" (copied the code from the generator and made it work) -->
            <div class="content-mid-left">Mid left</div>
            <div class="content-mid-right">Mid right</div>
            <div class="content-low-left">Low left</div>
            <div class="content-low-right">Low right</div>
            <div class="content-bottom">Bottom content</div>
        </main>

        <aside class="grid-item sidebar-right">Right sidebar</aside>
        
        <footer class="grid-item footer">Footer</footer>
    </div>

</body>
</html>
